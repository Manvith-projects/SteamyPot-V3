services:
  ai-layer:
    build:
      context: ./AI-Layer
      dockerfile: Dockerfile
    container_name: fd-ai-layer
    env_file:
      - ./AI-Layer/.env
    ports:
      - "9001:9001"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fd-backend
    env_file:
      - ./backend/.env
    environment:
      - AI_LAYER_URL=http://ai-layer:9001
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost
    depends_on:
      - ai-layer
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SERVER_URL=http://localhost:8000
    container_name: fd-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
